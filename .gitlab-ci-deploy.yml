.check-image-tag: &check-image-tag
  - if expr match $CI_COMMIT_BRANCH '^releases/.*$';
    then CANVAS_LMS_IMAGE_TAG="$( echo $CI_COMMIT_BRANCH | cut -d '/' -f 2 )";
    elif [ ! -z "$CI_COMMIT_TAG" ];
    then CANVAS_LMS_IMAGE_TAG=$CI_COMMIT_TAG;
    fi;

.pre-deploy: &pre-deploy
  - ssh $DEPLOY_USER@$CANVAS_LMS_DEPLOY_HOST "docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY"
  - ssh $DEPLOY_USER@$CANVAS_LMS_DEPLOY_HOST "docker pull $CANVAS_LMS_CI_REGISTRY_IMAGE:$CANVAS_LMS_IMAGE_TAG"
  - ssh $DEPLOY_USER@$CANVAS_LMS_DEPLOY_HOST "docker pull $CANVAS_LMS_CI_REGISTRY_IMAGE/deployer:$CANVAS_LMS_IMAGE_TAG"

.migration: &migration
  - ssh $DEPLOY_USER@$CANVAS_LMS_DEPLOY_HOST "docker run --rm -t
    --env RAILS_ENV=production
    --env CASSANDRA_SERVERS=$CANVAS_LMS_CASSANDRA_SERVERS
    --env CASSANDRA_PAGE_VIEWS_KEYSPACE=$CANVAS_LMS_CASSANDRA_PAGE_VIEWS_KEYSPACE
    --env CASSANDRA_AUDITORS_KEYSPACE=$CANVAS_LMS_CASSANDRA_AUDITORS_KEYSPACE
    --env DATABASE_DATABASE=$CANVAS_LMS_DATABASE_DATABASE
    --env DATABASE_USERNAME=$CANVAS_LMS_DATABASE_USERNAME
    --env DATABASE_PASSWORD=$CANVAS_LMS_DATABASE_PASSWORD
    --env DATABASE_HOST=$DATABASE_HOST
    $CANVAS_LMS_CI_REGISTRY_IMAGE:$CANVAS_LMS_IMAGE_TAG bundle exec rake db:migrate:predeploy"
  - ssh $DEPLOY_USER@$CANVAS_LMS_DEPLOY_HOST "docker run --rm -t
    --env RAILS_ENV=production
    --env CASSANDRA_SERVERS=$CANVAS_LMS_CASSANDRA_SERVERS
    --env CASSANDRA_PAGE_VIEWS_KEYSPACE=$CANVAS_LMS_CASSANDRA_PAGE_VIEWS_KEYSPACE
    --env CASSANDRA_AUDITORS_KEYSPACE=$CANVAS_LMS_CASSANDRA_AUDITORS_KEYSPACE
    --env DATABASE_DATABASE=$CANVAS_LMS_DATABASE_DATABASE
    --env DATABASE_USERNAME=$CANVAS_LMS_DATABASE_USERNAME
    --env DATABASE_PASSWORD=$CANVAS_LMS_DATABASE_PASSWORD
    --env DATABASE_HOST=$DATABASE_HOST
    $CANVAS_LMS_CI_REGISTRY_IMAGE:$CANVAS_LMS_IMAGE_TAG bundle exec rake db:migrate"
  - ssh $DEPLOY_USER@$CANVAS_LMS_DEPLOY_HOST "docker run --rm -t
    --env RAILS_ENV=production
    --env DATABASE_DATABASE=$CANVAS_LMS_DATABASE_DATABASE
    --env DATABASE_USERNAME=$CANVAS_LMS_DATABASE_USERNAME
    --env DATABASE_PASSWORD=$CANVAS_LMS_DATABASE_PASSWORD
    --env DATABASE_HOST=$DATABASE_HOST
    $CANVAS_LMS_CI_REGISTRY_IMAGE:$CANVAS_LMS_IMAGE_TAG bundle exec rake db:load_notifications"

.deploy-container: &deploy-container
    - ssh $DEPLOY_USER@$CANVAS_LMS_DEPLOY_HOST "docker run
      --rm
      -e CANVAS_LMS_CI_REGISTRY_IMAGE=$CANVAS_LMS_CI_REGISTRY_IMAGE
      -e CANVAS_LMS_IMAGE_TAG=$CANVAS_LMS_IMAGE_TAG
      -e CANVAS_LMS_DEPLOY_HOST=$CANVAS_LMS_DEPLOY_HOST
      -e CANVAS_LMS_DEPLOY_PORT=$CANVAS_LMS_DEPLOY_PORT
      -e CANVAS_LMS_EXTERNAL_TMP_DIRECTORY=$CANVAS_LMS_EXTERNAL_TMP_DIRECTORY
      -e CANVAS_LMS_EXTERNAL_LOG_DIRECTORY=$CANVAS_LMS_EXTERNAL_LOG_DIRECTORY
      -e CANVAS_LMS_EXTERNAL_SAML_DIRECTORY=$CANVAS_LMS_EXTERNAL_SAML_DIRECTORY
      -e CANVAS_LMS_EXTERNAL_CSS_DIRECTORY=$CANVAS_LMS_EXTERNAL_CSS_DIRECTORY
      -e CANVAS_LMS_DOCKER_LOG_MAX_SIZE=$CANVAS_LMS_DOCKER_LOG_MAX_SIZE
      -e DEPLOY_PORT=$CANVAS_LMS_DEPLOY_PORT
      -e CACHE_STORE_CACHE_STORE=$CANVAS_LMS_CACHE_STORE_CACHE_STORE
      -e CASSANDRA_SERVERS=$CANVAS_LMS_CASSANDRA_SERVERS
      -e CASSANDRA_PAGE_VIEWS_KEYSPACE=$CANVAS_LMS_CASSANDRA_PAGE_VIEWS_KEYSPACE
      -e CASSANDRA_AUDITORS_KEYSPACE=$CANVAS_LMS_CASSANDRA_AUDITORS_KEYSPACE
      -e DATABASE_DATABASE=$CANVAS_LMS_DATABASE_DATABASE
      -e DATABASE_USERNAME=$CANVAS_LMS_DATABASE_USERNAME
      -e DATABASE_PASSWORD=$CANVAS_LMS_DATABASE_PASSWORD
      -e DATABASE_HOST=$DATABASE_HOST
      -e DOMAIN_DOMAIN=$CANVAS_LMS_DOMAIN_DOMAIN
      -e DOMAIN_SSL=$CANVAS_LMS_DOMAIN_SSL
      -e DYNAMIC_SETTINGS_ENCRYPTION_SECRET=$CANVAS_LMS_DYNAMIC_SETTINGS_ENCRYPTION_SECRET
      -e DYNAMIC_SETTINGS_SIGNING_SECRET=$CANVAS_LMS_DYNAMIC_SETTINGS_SIGNING_SECRET
      -e DYNAMIC_SETTINGS_MATH_MAN_BASE_URL=$CANVAS_LMS_DYNAMIC_SETTINGS_MATH_MAN_BASE_URL
      -e DYNAMIC_SETTINGS_MATH_MAN_USE_FOR_SVG=$CANVAS_LMS_DYNAMIC_SETTINGS_MATH_MAN_USE_FOR_SVG
      -e DYNAMIC_SETTINGS_MATH_MAN_USE_FOR_MML=$CANVAS_LMS_DYNAMIC_SETTINGS_MATH_MAN_USE_FOR_MML
      -e DYNAMIC_SETTINGS_RICH_CONTENT_SERVICE_HOST=$CANVAS_LMS_DYNAMIC_SETTINGS_RICH_CONTENT_SERVICE_HOST
      -e DYNAMIC_SETTINGS_COMMON_CARTRIDGE_VIEWER_BASE_URL=$CANVAS_LMS_DYNAMIC_SETTINGS_COMMON_CARTRIDGE_VIEWER_BASE_URL
      -e DYNAMIC_SETTINGS_COMMON_CARTRIDGE_VIEWER_URL=$CANVAS_LMS_DYNAMIC_SETTINGS_COMMON_CARTRIDGE_VIEWER_URL
      -e FILE_STORE_STORAGE=$CANVAS_LMS_FILE_STORE_STORAGE
      -e FILE_STORE_PATH_PREFIX=$CANVAS_LMS_FILE_STORE_PATH_PREFIX
      -e OUTGOING_MAIL_PRODUCTION_ADDRESS=$CANVAS_LMS_OUTGOING_MAIL_PRODUCTION_ADDRESS
      -e OUTGOING_MAIL_PRODUCTION_PORT=$CANVAS_LMS_OUTGOING_MAIL_PRODUCTION_PORT
      -e OUTGOING_MAIL_PRODUCTION_DOMAIN=$CANVAS_LMS_OUTGOING_MAIL_PRODUCTION_DOMAIN
      -e OUTGOING_MAIL_PRODUCTION_OUTGOING_ADDRESS=$CANVAS_LMS_OUTGOING_MAIL_PRODUCTION_OUTGOING_ADDRESS
      -e OUTGOING_MAIL_PRODUCTION_DEFAULT_NAME=$CANVAS_LMS_OUTGOING_MAIL_PRODUCTION_DEFAULT_NAME
      -e PREDOC_URL=$CANVAS_LMS_PREDOC_URL
      -e REDIS_SERVERS=$CANVAS_LMS_REDIS_SERVERS
      -e REDIS_DATABASE=$CANVAS_LMS_REDIS_DATABASE
      -e SAML_ENTITY_ID=$CANVAS_LMS_SAML_ENTITY_ID
      -e SAML_TECH_CONTACT_NAME=$CANVAS_LMS_SAML_TECH_CONTACT_NAME
      -e SAML_TECH_CONTACT_EMAIL=$CANVAS_LMS_SAML_TECH_CONTACT_EMAIL
      -e SAML_PRIVATE_KEY=$CANVAS_LMS_SAML_PRIVATE_KEY
      -e SAML_CERTIFICATE=$CANVAS_LMS_SAML_CERTIFICATE
      -e SECURITY_ENCRYPTION_KEY=$CANVAS_LMS_SECURITY_ENCRYPTION_KEY
      -e SECURITY_LTI_ISS=$CANVAS_LMS_SECURITY_LTI_ISS
      -e SESSION_STORE_SESSION_STORE=$CANVAS_LMS_SESSION_STORE_SESSION_STORE
      -e SESSION_STORE_EXPIRE_AFTER=$CANVAS_LMS_SESSION_STORE_EXPIRE_AFTER
      -e SESSION_STORE_SECURE=$CANVAS_LMS_SESSION_STORE_SECURE
      -e PASSENGERFILE_MAX_POOL_SIZE=$CANVAS_LMS_PASSENGERFILE_MAX_POOL_SIZE
      -e PASSENGERFILE_MIN_INSTANCES=$CANVAS_LMS_PASSENGERFILE_MIN_INSTANCES
      -e PASSENGERFILE_MAX_REQUEST_QUEUE_SIZE=$CANVAS_LMS_PASSENGERFILE_MAX_REQUEST_QUEUE_SIZE
      -e PASSENGERFILE_MAX_REQUESTS=$CANVAS_LMS_PASSENGERFILE_MAX_REQUESTS
      -e PASSENGERFILE_POOL_IDLE_TIME=$CANVAS_LMS_PASSENGERFILE_POOL_IDLE_TIME
      -e PASSENGERFILE_START_TIMEOUT=$CANVAS_LMS_PASSENGERFILE_START_TIMEOUT
      -e LOGGING_LEVEL=$CANVAS_LMS_LOGGING_LEVEL
      -e DELAYED_JOB_DELAY_DISCUSSION_ENTRY_CONTEXT_MODULE_ACTION=$CANVAS_LMS_DELAYED_JOB_DELAY_DISCUSSION_ENTRY_CONTEXT_MODULE_ACTION
      -v /var/run/docker.sock:/var/run/docker.sock
      $CANVAS_LMS_CI_REGISTRY_IMAGE/deployer:$CANVAS_LMS_IMAGE_TAG
        --project-name $CANVAS_LMS_CONTAINER_NAME
        up --detach"

.canvas-lms-deploy:
  script:
    - *check-image-tag
    - *pre-deploy
    - *migration
    - *deploy-container
